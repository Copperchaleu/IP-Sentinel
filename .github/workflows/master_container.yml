name: Master Container Image

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
    paths:
      - '.github/workflows/master_container.yml'
      - '.dockerignore'
      - 'docker-compose.master.yml'
      - 'master/**'
      - 'version.txt'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-master-image:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Prepare Image Metadata
        id: image
        shell: bash
        run: |
          OWNER_LC="${GITHUB_REPOSITORY_OWNER,,}"
          MASTER_VERSION="$(grep '^MASTER_VERSION=' version.txt | cut -d= -f2 | tr -d '[:space:]')"
          echo "name=ghcr.io/${OWNER_LC}/ip-sentinel-master" >> "$GITHUB_OUTPUT"
          echo "version=${MASTER_VERSION:-4.3.1}" >> "$GITHUB_OUTPUT"

      - name: Set Up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set Up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Master Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: master/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            MASTER_VERSION=${{ steps.image.outputs.version }}
          tags: |
            ${{ steps.image.outputs.name }}:latest
            ${{ steps.image.outputs.name }}:${{ steps.image.outputs.version }}
          labels: |
            org.opencontainers.image.title=IP-Sentinel Master
            org.opencontainers.image.description=Containerized IP-Sentinel Master command center
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.image.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
